    <path d="M110 260 C70 240, 70 310, 115 300" stroke="white" stroke-width="14" stroke-linecap="round" fill="none"/>

    <circle cx="370" cy="235" r="7" fill="#1E1E1E"/>

    <ellipse cx="395" cy="265" rx="24" ry="18" fill="#EAEAEA"/>
    <circle cx="388" cy="265" r="3.5" fill="#777"/>
    <circle cx="402" cy="265" r="3.5" fill="#777"/>

